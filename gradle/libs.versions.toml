[versions]
errorprone = "2.50.0"
errorprone-plugin = "5.1.0"
gson = "2.14.0"
idea-ext = "1.4.1"
jackson = "3.2.0"
jnats = "2.25.3"
jspecify = "1.0.0"
junit = "6.1.0"
kotlin = "2.4.0"
micrometer = "1.17.0"
namastack-outbox = "1.7.1"
nmcp = "1.6.0"
nullaway = "0.13.7"
slf4j = "2.0.18"
spotless = "8.8.0"
spring-boot = "4.1.0"
spring-framework = "7.0.8"
testcontainers = "2.0.5"
testcontainers-nats = "1.1.5"

[plugins]
errorprone = { id = "net.ltgt.errorprone", version.ref = "errorprone-plugin" }
idea-ext = { id = "org.jetbrains.gradle.plugin.idea-ext", version.ref = "idea-ext" }
kotlin-jpa = { id = "org.jetbrains.kotlin.plugin.jpa", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
nmcp = { id = "com.gradleup.nmcp", version.ref = "nmcp" }
nmcp-aggregation = { id = "com.gradleup.nmcp.aggregation", version.ref = "nmcp" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }

[libraries]
# spring boot starter modules
spring-boot-starter = { module = "org.springframework.boot:spring-boot-starter", version.ref = "spring-boot" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "spring-boot" }
spring-boot-starter-jackson = { module = "org.springframework.boot:spring-boot-starter-jackson", version.ref = "spring-boot" }
spring-boot-starter-jackson-test = { module = "org.springframework.boot:spring-boot-starter-jackson-test", version.ref = "spring-boot" }

# spring boot modules
spring-boot-autoconfigure = { module = "org.springframework.boot:spring-boot-autoconfigure", version.ref = "spring-boot" }
spring-boot-autoconfigure-processor = { module = "org.springframework.boot:spring-boot-autoconfigure-processor", version.ref = "spring-boot" }
spring-boot-configuration-processor = { module = "org.springframework.boot:spring-boot-configuration-processor", version.ref = "spring-boot" }
spring-boot-gson = { module = "org.springframework.boot:spring-boot-gson", version.ref = "spring-boot" }
spring-boot-health = { module = "org.springframework.boot:spring-boot-health", version.ref = "spring-boot" }
spring-boot-jackson = { module = "org.springframework.boot:spring-boot-jackson", version.ref = "spring-boot" }
spring-boot-micrometer-metrics = { module = "org.springframework.boot:spring-boot-micrometer-metrics", version.ref = "spring-boot" }
spring-boot-testcontainers = { module = "org.springframework.boot:spring-boot-testcontainers", version.ref = "spring-boot" }

# spring core modules
spring-context = { module = "org.springframework:spring-context", version.ref = "spring-framework" }

# other modules
errorprone-core = { module = "com.google.errorprone:error_prone_core", version.ref = "errorprone" }
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
jackson-databind = { module = "tools.jackson.core:jackson-databind", version.ref = "jackson" }
jnats = { module = "io.nats:jnats", version.ref = "jnats" }
jspecify = { module = "org.jspecify:jspecify", version.ref = "jspecify" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit" }
micrometer-core = { module = "io.micrometer:micrometer-core", version.ref = "micrometer" }
micrometer-registry-prometheus = { module = "io.micrometer:micrometer-registry-prometheus", version.ref = "micrometer" }
namastack-outbox-api = { module = "io.namastack:namastack-outbox-api", version.ref = "namastack-outbox" }
nullaway = { module = "com.uber.nullaway:nullaway", version.ref = "nullaway" }
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
testcontainers-junit-jupiter = { module = "org.testcontainers:testcontainers-junit-jupiter", version.ref = "testcontainers" }
testcontainers-mongodb = { module = "org.testcontainers:testcontainers-mongodb", version.ref = "testcontainers" }
testcontainers-nats = { module = "io.github.amadeusitgroup.testcontainers:nats", version.ref = "testcontainers-nats" }

# BOMs used by example projects only
namastack-outbox-bom = { module = "io.namastack:namastack-outbox-bom", version.ref = "namastack-outbox" }
spring-boot-dependencies = { module = "org.springframework.boot:spring-boot-dependencies", version.ref = "spring-boot" }

# modules used by example projects only
flyway-database-postgresql = { module = "org.flywaydb:flyway-database-postgresql" }
namastack-outbox-starter-jpa = { module = "io.namastack:namastack-outbox-starter-jpa" }
postgresql = { module = "org.postgresql:postgresql" }
spring-boot-starter-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa" }
spring-boot-starter-data-jpa-test = { module = "org.springframework.boot:spring-boot-starter-data-jpa-test" }
spring-boot-starter-data-mongodb = { module = "org.springframework.boot:spring-boot-starter-data-mongodb" }
spring-boot-starter-data-mongodb-test = { module = "org.springframework.boot:spring-boot-starter-data-mongodb-test" }
spring-boot-starter-flyway = { module = "org.springframework.boot:spring-boot-starter-flyway" }
spring-boot-starter-flyway-test = { module = "org.springframework.boot:spring-boot-starter-flyway-test" }
spring-boot-starter-webmvc = { module = "org.springframework.boot:spring-boot-starter-webmvc" }
spring-boot-starter-webmvc-test = { module = "org.springframework.boot:spring-boot-starter-webmvc-test" }
testcontainers-postgresql = { module = "org.testcontainers:testcontainers-postgresql" }
